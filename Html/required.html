<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Address : </label>
        <textarea rows="5" cols="50" name="" id=""></textarea>
        <br><br>
        <input type="text" placeholder="username">
        <input type="email" placeholder="email" required>
        <input type="text" disabled>
        <input type="tel" placeholder="contact" maxlength="10" minlength="10">
        <input type="date" max="2026-06-30" min="2026-06-01">
        <input type="text" placeholder="password" pattern="[A-Za-z09@#$]{8}">
        <button>Submit</button>
    </form>
</body>
</html>
